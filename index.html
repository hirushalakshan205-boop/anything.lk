<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anything.lk Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; margin: 0; 
            background: url('https://png.pngtree.com/thumb_back/fw800/background/20230610/pngtree-purple-texture-background-images-hd-pictures-and-wallpaper-image_2951717.jpg') no-repeat center center fixed; 
            background-size: cover; color: #fff; overflow-x: hidden;
        }

        header { background: #000; padding: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); position: relative; z-index: 9999; }
        header span { font-size: 26px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }

        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease-in; position: relative; z-index: 1000; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .black-section { background: #000; margin: -20px -20px 20px -20px; padding: 20px; border-bottom: 1px solid #222; }

        .box { background: rgba(0,0,0,0.95); padding: 25px; border-radius: 20px; max-width: 400px; margin: auto; border: 1px solid #333; }
        input, select { 
            width: 95%; padding: 12px; margin: 10px 0; border: 1px solid #444; 
            background: #111 !important; color: white !important; border-radius: 10px; outline: none;
        }

        .main-btn, .wa-link, .back-btn, .cat-btn, .admin-nav-link { 
            position: relative !important; z-index: 10001 !important; cursor: pointer !important; text-decoration: none;
        }

        .main-btn { 
            width: 85%; max-width: 350px; padding: 18px; border: none; border-radius: 12px; 
            font-weight: 800; text-transform: uppercase; text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5); display: block; margin: 15px auto; 
        }
        .btn-buy { background: #fff; color: #4b0082; }
        .btn-sell { background: #8e60b5; color: #fff; }

        .admin-nav-link {
            display: block; text-align: right; font-size: 11px; color: #666; 
            margin-bottom: 20px; font-weight: bold; text-transform: uppercase;
        }

        .wa-link {
            background: #25D366; color: white; padding: 12px; 
            border-radius: 8px; width: 90%; font-weight: bold;
            margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        #list { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding-bottom: 150px; }
        .card { background: rgba(0,0,0,0.8); padding: 12px; border-radius: 15px; border: 1px solid #222; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .card img { width: 100%; height: 130px; object-fit: cover; border-radius: 10px; }

        .category-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .cat-btn { background: transparent; border: 1.5px solid #fff; color: white; padding: 10px 18px; border-radius: 8px; white-space: nowrap; }
        .cat-btn.active-cat { background: #fff; color: #000; }

        .back-btn { background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; }
        
        .admin-only { display: none; }
        .admin-mode .admin-only { display: block; }

        .cat-item {
            display: flex; justify-content: space-between; align-items: center;
            background: #111; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #222;
        }
    </style>

    <script type='text/javascript' src='//pl25915647.profitablecpmratenetwork.com/8c/da/80/8cda80fee130449719e6e901610aded0.js'></script>
</head>
<body id="main-body">

    <header><span>ANYTHING.LK</span></header>

    <div id="home-screen" class="screen active">
        <div class="admin-nav-link" onclick="showScreen('login-screen')">Admin Access ○</div>
        <div style="height: 20px;"></div>
        <button class="main-btn btn-buy" onclick="showScreen('buy-screen')">🛒 BROWSE MARKET</button>
        <button class="main-btn btn-sell" onclick="showScreen('sell-screen')">➕ POST AN AD</button>
        
        <div style="margin-top: 30px; text-align: center;">
            <script async="async" data-cfasync="false" src="//pl25915546.profitablecpmratenetwork.com/f5ab5e35c967dcc3125b27ecb3837b59/invoke.js"></script>
            <div id="container-f5ab5e35c967dcc3125b27ecb3837b59"></div>
        </div>
    </div>

    <div id="login-screen" class="screen">
        <div class="box">
            <h2 style="text-align:center;">Staff Login</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="main-btn btn-buy" style="width:100%" onclick="login()">ENTER</button>
            <button class="back-btn" style="width:100%; margin-top:10px;" onclick="showScreen('home-screen')">BACK</button>
        </div>
    </div>

    <div id="buy-screen" class="screen">
        <div class="black-section">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button class="back-btn" onclick="showScreen('home-screen')">BACK</button>
                <h2 style="margin:0;">Explore</h2>
                <button class="admin-only" style="background:#0088ff; color:white; border:none; padding:8px 12px; border-radius:5px;" onclick="showScreen('manage-cat-screen')">⚙️</button>
            </div>
            <div class="category-bar" id="filter-bar"></div>
        </div>
        <div id="list">Loading Items...</div>
    </div>

    <div id="sell-screen" class="screen">
        <div class="black-section">
            <button class="back-btn" onclick="showScreen('home-screen')">BACK</button>
            <h2 style="display:inline; margin-left:15px;">Post Ad</h2>
        </div>
        <div class="box">
            <input type="text" id="title" placeholder="Item Name">
            <input type="number" id="price" placeholder="Price (Rs.)">
            <input type="text" id="wa-num" placeholder="WhatsApp (9477xxxxxxx)">
            <select id="post-cat"></select>
            <input type="file" id="imgInp" accept="image/*">
            <button class="main-btn btn-sell" style="width:100%" id="pub" onclick="publish()">🚀 PUBLISH NOW</button>
        </div>
    </div>

    <div id="manage-cat-screen" class="screen">
        <div class="black-section">
            <button class="back-btn" onclick="showScreen('buy-screen')">BACK</button>
            <h2 style="display:inline; margin-left:15px;">Categories</h2>
        </div>
        <div class="box">
            <input type="text" id="new-cat-name" placeholder="Category Name">
            <button class="main-btn btn-buy" style="width:100%" onclick="addCategory()">ADD CATEGORY</button>
            <hr style="border:0.5px solid #333; margin:20px 0;">
            <div id="cat-list-admin"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxuxJas8r3_RWcq-Pc-oXpsesVPc-CEHo",
            authDomain: "anything-5beb7.firebaseapp.com",
            databaseURL: "https://anything-5beb7-default-rtdb.firebaseio.com",
            projectId: "anything-5beb7",
            appId: "1:259245621399:web:fc9e2013c0df90009aa9d2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const IMG_KEY = "b5c90bc5900ba7e407f4467601971745";
        let isAdmin = false;

        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        };

        window.login = () => {
            if(document.getElementById('user').value === "anything.lk" && document.getElementById('pass').value === "9999") {
                isAdmin = true;
                document.getElementById('main-body').classList.add('admin-mode');
                alert("Welcome Boss!");
                showScreen('buy-screen');
            } else alert("Invalid Login!");
        };

        // Real-time Category Loader
        onValue(ref(db, 'categories'), (snap) => {
            const cats = [];
            snap.forEach(c => { cats.push({id: c.key, name: c.val().name}); });
            
            document.getElementById('post-cat').innerHTML = cats.map(c => `<option>${c.name}</option>`).join('');
            
            const fBar = document.getElementById('filter-bar');
            fBar.innerHTML = `<button class="cat-btn active-cat" onclick="filterAds('All', this)">All</button>`;
            cats.forEach(c => fBar.innerHTML += `<button class="cat-btn" onclick="filterAds('${c.name}', this)">${c.name}</button>`);
            
            const aList = document.getElementById('cat-list-admin');
            aList.innerHTML = cats.map(c => `
                <div class="cat-item">
                    <span>${c.name}</span>
                    <button onclick="deleteCategory('${c.id}')" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px;">DELETE</button>
                </div>
            `).join('');
        });

        window.addCategory = () => {
            const name = document.getElementById('new-cat-name').value;
            if(name) {
                push(ref(db, 'categories'), { name: name });
                document.getElementById('new-cat-name').value = "";
            }
        };

        window.deleteCategory = (id) => { if(confirm("අයින් කරන්නද?")) remove(ref(db, 'categories/' + id)); };

        window.publish = async () => {
            const f = document.getElementById('imgInp').files[0];
            const title = document.getElementById('title').value;
            const price = document.getElementById('price').value;
            let phone = document.getElementById('wa-num').value;
            const btn = document.getElementById('pub');

            if(!f || !title || !price || !phone) return alert("Fill all fields!");
            phone = phone.replace('+', '').replace(/\s/g, ''); 

            btn.innerText = "Processing..."; btn.disabled = true;
            let fd = new FormData(); fd.append("image", f);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMG_KEY}`, { method: "POST", body: fd });
            const data = await res.json();

            push(ref(db, 'ads'), {
                name: title, price: price, phone: phone,
                category: document.getElementById('post-cat').value,
                img: data.data.url, time: Date.now()
            }).then(() => {
                alert("Success!"); showScreen('buy-screen');
                btn.innerText = "🚀 PUBLISH NOW"; btn.disabled = false;
            });
        };

        let allAds = [];
        onValue(ref(db, 'ads'), (snap) => {
            allAds = []; snap.forEach(c => allAds.push({id: c.key, ...c.val()}));
            renderAds(allAds);
        });

        window.renderAds = (ads) => {
            const list = document.getElementById('list');
            list.innerHTML = "";
            ads.sort((a,b) => b.time - a.time).forEach(item => {
                const msg = encodeURIComponent(`Interested in: ${item.name}`);
                const waLink = `https://wa.me/${item.phone}?text=${msg}`;
                list.innerHTML += `
                    <div class="card">
                        <img src="${item.img}">
                        <h4 style="margin:10px 0 5px 0;">${item.name}</h4>
                        <p style="color:#00ff00; font-weight:bold; margin:0;">Rs. ${item.price}</p>
                        <a href="${waLink}" class="wa-link" target="_blank">💬 WhatsApp</a>
                        ${isAdmin ? `<button onclick="deleteAd('${item.id}')" style="background:red; color:white; margin-top:8px; padding:5px; width:90%; border-radius:5px; border:none; cursor:pointer;">Delete Ad</button>` : ''}
                    </div>`;
            });
        };

        window.filterAds = (cat, btn) => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-cat'));
            btn.classList.add('active-cat');
            renderAds(cat === 'All' ? allAds : allAds.filter(a => a.category === cat));
        };

        window.deleteAd = (id) => { if(confirm("Delete this Ad?")) remove(ref(db, 'ads/' + id)); };
    </script>
</body>
</html>
